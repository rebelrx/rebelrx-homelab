name: arr
services:
  # Gluetun (VPN)
  # https://github.com/qdm12/gluetun
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # Publish the VPN-namespaced services through the Gluetun container
    ports:
      - ${PROWLARR_PORT}:9696
      - ${QBITTORRENT_WEBUI_PORT}:8090 # qBittorrent WebUI
      - ${QBITTORRENT_TORRENT_PORT}:6881 # qBittorrent TCP
      - ${QBITTORRENT_UDP_PORT}:6881/udp # qBittorrent UDP
      - ${SABNZBD_PORT}:8080
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_CITIES=${SERVER_CITIES}
      - DNS_KEEP_NAMESERVER=${DNS_KEEP_NAMESERVER}
      - FIREWALL_INPUT_SUBNETS=${FIREWALL_INPUT_SUBNETS}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
    networks:
      - media_net
    healthcheck:
      test: ping -c 1 google.com || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - wud.watch=false
  # qBittorrent (Torrent client, routed through Gluetun)
  # https://docs.linuxserver.io/images/docker-qbittorrent/
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT}
      - TORRENTING_PORT=${QBITTORRENT_TORRENT_PORT}
    volumes:
      - ${QBITTORRENT_CONFIG}:/config
      - ${QBITTORRENT_TORRENTS}:/torrents
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # SABnzbd (Usenet client, routed through Gluetun)
  # https://docs.linuxserver.io/images/docker-sabnzbd/
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${SABNZBD_CONFIG}:/config
      - ${SABNZBD_INCOMPLETE_DOWNLOADS}:/incomplete-downloads
      - ${SABNZBD_DOWNLOADS}:/downloads
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Prowlarr (Indexers, routed through Gluetun)
  # https://docs.linuxserver.io/images/docker-prowlarr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${PROWLARR_CONFIG}:/config
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Sonarr (TV)
  # https://docs.linuxserver.io/images/docker-sonarr
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - ${SONARR_PORT}:8989
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${SONARR_TV}:/tv
      - ${SONARR_DOWNLOADS}:/downloads
      - ${SONARR_TORRENTS}:/torrents
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Radarr (Movies)
  # https://docs.linuxserver.io/images/docker-radarr
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - ${RADARR_PORT}:7878
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${RADARR_MOVIES}:/movies
      - ${RADARR_DOWNLOADS}:/downloads
      - ${RADARR_TORRENTS}:/torrents
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Lidarr (Music)
  # https://docs.linuxserver.io/images/docker-lidarr
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    ports:
      - ${LIDARR_PORT}:8686
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${LIDARR_CONFIG}:/config
      - ${LIDARR_MUSIC}:/music
      - ${LIDARR_DOWNLOADS}:/downloads
      - ${LIDARR_TORRENTS}:/torrents
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # LazyLibrarian (Books)
  # https://docs.linuxserver.io/images/docker-lazylibrarian/
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    restart: unless-stopped
    ports:
      - ${LAZYLIBRARIAN_PORT}:5299
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg #optional
    volumes:
      - ${LAZYLIBRARIAN_CONFIG}:/config
      - ${LAZYLIBRARIAN_BOOKS}:/books
      - ${LAZYLIBRARIAN_DOWNLOADS}:/downloads
      - ${LAZYLIBRARIAN_TORRENTS}:/torrents
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Mylar3 (Comics)
  # https://docs.linuxserver.io/images/docker-mylar3
  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    restart: unless-stopped
    ports:
      - ${MYLAR_PORT}:8090
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${MYLAR_CONFIG}:/config
      - ${MYLAR_LIBRARY}:/comics
      - ${COMICS_STAGING}:/comics-staging
      - ${QBITTORRENT_TORRENTS}:/torrents
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Bazarr (Subtitles)
  # https://docs.linuxserver.io/images/docker-bazarr/
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    ports:
      - ${BAZARR_PORT}:6767
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${BAZARR_CONFIG}:/config
      - ${BAZARR_MOVIES}:/movies
      - ${BAZARR_TV}:/tv
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Overseerr (Requests)
  # https://docs.linuxserver.io/images/docker-overseerr/
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    restart: unless-stopped
    ports:
      - ${OVERSEERR_PORT}:5055
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${OVERSEERR_CONFIG}:/config
    networks:
      - media_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
