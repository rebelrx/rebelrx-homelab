name: speedtest
services:
  # Speedtest-tracker (Network Monitoring)
  # https://hub.docker.com/r/linuxserver/speedtest-tracker
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    ports:
      - 127.0.0.1:${SPEEDTEST_PORT_HTTP}:80
      - 127.0.0.1:${SPEEDTEST_PORT_HTTPS}:443
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - ASSET_URL=${ASSET_URL}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE}
      - DISPLAY_TIMEZONE=${DISPLAY_TIMEZONE}
      - PRUNE_RESULTS_OLDER_THAN=7
    volumes:
      - ${SPEEDTEST_CONFIG}:/config
    networks:
      - proxy_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Librespeed Speedtest (Network Monitoring)
  # https://docs.linuxserver.io/images/docker-librespeed/
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    container_name: librespeed
    restart: unless-stopped
    ports:
      - 127.0.0.1:${LIBRESPEED_PORT}:80
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - PASSWORD=${LIBRESPEED_PASSWORD}
      - CUSTOM_RESULTS=false
      - DB_TYPE=sqlite
    volumes:
      - ${LIBRESPEED_CONFIG}:/config
    networks:
      - proxy_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
networks:
  proxy_net:
    external: true
