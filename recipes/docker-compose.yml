name: recipes
services:
  # Mealie (Recipe Management)
  # https://docs.mealie.io/documentation/getting-started/installation/postgres/
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - ${MEALIE_PORT}:9000
    environment:
      # Set Backend ENV Variables Here
      - ALLOW_SIGNUP=false
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - BASE_URL=${URL}
      # Database Settings
      - DB_ENGINE=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${MEALIE_DATA}:/app/data
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          memory: 1000M
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # PostgreSQL (Database)
  postgres:
    image: postgres:17
    container_name: mealie-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGUSER=${PGUSER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${MEALIE_PGDATA}:/var/lib/postgresql/data
    networks:
      - proxy_net
    healthcheck:
      test:
        - CMD
        - pg_isready
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
networks:
  proxy_net:
    external: true
