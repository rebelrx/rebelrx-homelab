name: template

services:
  # App Name (Description)
  # https://example.com/docs
  app:
    image: example/image:latest
    container_name: template_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:8080"
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${APP_DATA}:/data
    networks:
      - proxy_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false

networks:
  proxy_net:
    external: true
