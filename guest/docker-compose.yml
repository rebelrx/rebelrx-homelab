name: guest
services:
  # Tailscale (VPN sidecar)
  # https://tailscale.com/docs/features/containers/docker
  tailscale-romm:
    image: tailscale/tailscale:stable
    container_name: tailscale-romm
    hostname: romm-guest
    restart: unless-stopped
    cap_add:
      - net_admin
      - net_raw
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ${TAILSCALE_ROMM_STATE}:/var/lib/tailscale
      - ${SERVE_CONFIG}:/config/serve.json
    networks:
      - guest_net
networks:
  guest_net:
    external: true
