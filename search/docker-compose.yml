name: search
services:
  # SearXNG (Web Search)
  # https://docs.searxng.org/admin/installation-docker.html
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - 127.0.0.1:${SEARXNG_PORT}:8080
    volumes:
      - ${SEARXNG_CONFIG}:/etc/searxng
      - ${SEARXNG_DATA}:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
      - SEARXNG_VALKEY_URL=valkey://valkey:6379/0
      - FORCE_OWNERSHIP=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - proxy_net
      - searxng_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - ${SEARXNG_DB_DATA}:/data
    healthcheck:
      test:
        - CMD
        - valkey-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - searxng_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
networks:
  searxng_net:
    driver: bridge
    internal: true
  proxy_net:
    external: true
