name: media
services:
  # Plex (Media Server)
  # https://hub.docker.com/r/linuxserver/plex
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ${PLEX_CONFIG}:/config
      - ${PLEX_MEDIA}:/media
      - ${PLEX_MOVIES}:/movies
      - ${PLEX_TV}:/tv
      - ${PLEX_MUSIC}:/music
      - ${PLEX_TRANSCODE}:/transcode
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Jellyfin (Media Server)
  # https://docs.linuxserver.io/images/docker-jellyfin/
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    runtime: nvidia
    ports:
      - ${JELLYFIN_PORT}:8096
      # - 8920:8920 #optional
      # - 7359:7359/udp #optional
      # - 1900:1900/udp #optional
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_PUBLISHED_SERVER_URL}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${JELLYFIN_TRANSCODE}:/transcode
      - ${JELLYFIN_MEDIA}:/media
      - ${JELLYFIN_MOVIES}:/movies
      - ${JELLYFIN_TV}:/tv
      - ${JELLYFIN_MUSIC}:/music
    networks:
      - media_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
networks:
  media_net:
    external: true
