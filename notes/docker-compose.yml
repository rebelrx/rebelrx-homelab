name: notes
services:
  # Trilium Notes (Note Taking)
  # https://github.com/TriliumNext/Trilium
  trilium:
    image: triliumnext/trilium:latest
    container_name: trilium
    restart: unless-stopped
    ports:
      - 127.0.0.1:${TRILIUM_PORT}:8080
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${TRILIUM_DATA_DIR}:/home/node/trilium-data
    networks:
      - proxy_net
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Joplin Server (Note Taking & Sync)
  # https://github.com/laurent22/joplin
  joplin:
    image: joplin/server:latest
    container_name: joplin-server
    restart: unless-stopped
    depends_on:
      - joplin-db
    ports:
      - "127.0.0.1:${JOPLIN_PORT}:22300"
    environment:
      - TZ=${TIMEZONE}
      - APP_PORT=${JOPLIN_PORT}
      - APP_BASE_URL=${JOPLIN_BASE_URL}
      - DB_CLIENT=pg
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PORT=${JOPLIN_DB_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
    networks:
      - proxy_net
      - joplin
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false
  # Joplin PostgreSQL Database
  joplin-db:
    image: postgres:16
    container_name: joplin-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JOPLIN_DB_PORT}:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    volumes:
      - ${JOPLIN_DB_DIR}:/var/lib/postgresql/data
    networks:
      - joplin
    labels:
      - wud.watch=true
      - wud.trigger.docker.enable=false

networks:
  proxy_net:
    external: true
  joplin:
    external: true
